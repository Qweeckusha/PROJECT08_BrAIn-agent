<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrAIn</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body data-mode="read">
    <div class="app-container">
        <aside class="sidebar">
            <h1 class="logo">🧠 BrAIn</h1>
            <div class="mode-switch">
                <input type="radio" id="mode-read" name="mode" value="read" checked>
                <label for="mode-read">🔍 Чтение</label>
                <input type="radio" id="mode-write" name="mode" value="write">
                <label for="mode-write">✍️ Запись</label>
            </div>
            <div class="sources-list" id="sources-list">
                <p class="placeholder">Источники появятся здесь...</p>
            </div>
        </aside>

        <main class="main-chat">
            <header class="chat-header">
                <span id="current-mode">Режим: Чтение</span>
            </header>
            <div class="chat-output" id="output">
                <p class="placeholder">Задай вопрос или добавь запись...</p>
            </div>
            <form class="input-area" id="input-form">
                <textarea id="user-input" rows="1" placeholder="Спроси что-нибудь..."></textarea>
                <button type="submit" id="submit-btn">Отправить</button>
            </form>
        </main>
    </div>

    <div class="alert" id="alert"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="static/js/app.js"></script>
</body>
</html>
